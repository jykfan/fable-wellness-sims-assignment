name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys by pushing the built site to the gh-pages branch (the classic
# Pages source, auto-enabled when the branch exists). This only needs
# contents:write — the actions/deploy-pages flow requires the Pages site
# to be created via the settings API, which the workflow token used by
# this repo is not permitted to do.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish dist/ to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
